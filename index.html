<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>StudioFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Verificação de licença ANTES de mostrar o app -->
<script src="js/licenca.js"></script>
<script>
  ;(async function () {
    if (ghzLicense.sessionValid()) return
    if (ghzLicense.cacheActive()) {
      ghzLicense.markSession()
      ghzLicense.validateOnline().catch(() => {})
      return
    }
    try {
      const r = await ghzLicense.validateOnline()
      if (r?.ok) { ghzLicense.markSession(); return }
    } catch (e) {
      if (ghzLicense.cacheActive()) { ghzLicense.markSession(); return }
    }
    window.location.replace('pages/licenca.html')
  })()
</script>

<div class="container">
  <div class="menu">
    <div class="menu-logo">
      <img src="logo.png" class="logo-img" alt="StudioFlow">
      <span class="logo-text">Studio<span class="logo-accent">Flow</span></span>
    </div>

    <nav class="menu-nav">
      <button class="nav-btn active" onclick="abrirPagina('pages/dashboard.html', this)">
        <span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-btn" onclick="abrirPagina('pages/agenda.html', this)">
        <span class="nav-icon">📅</span><span class="nav-label">Agenda</span>
      </button>
      <button class="nav-btn" onclick="abrirPagina('pages/clientes.html', this)">
        <span class="nav-icon">👥</span><span class="nav-label">Clientes</span>
        <span class="nav-badge" id="badgeClientes"></span>
      </button>
      <button class="nav-btn" onclick="abrirPagina('pages/servicos.html', this)">
        <span class="nav-icon">💈</span><span class="nav-label">Serviços</span>
      </button>
      <button class="nav-btn" onclick="abrirPagina('pages/financeiro.html', this)">
        <span class="nav-icon">💰</span><span class="nav-label">Financeiro</span>
      </button>

      <div style="height:1px;background:#2A2A2A;margin:8px 4px"></div>

      <button class="nav-btn" onclick="abrirPagina('pages/como_usar.html', this)">
        <span class="nav-icon">📖</span><span class="nav-label">Como Usar</span>
      </button>
      <button class="nav-btn" onclick="abrirPagina('pages/sobre.html', this)">
        <span class="nav-icon">ℹ️</span><span class="nav-label">Sobre</span>
      </button>
      <button class="nav-btn" onclick="abrirPagina('pages/atualizacao.html', this)">
        <span class="nav-icon">🔄</span><span class="nav-label">Atualização</span>
      </button>
    </nav>

    <div class="menu-footer">
      <div class="menu-footer-brand">Desenvolvido por</div>
      <div class="menu-footer-name">GHZ Plugin</div>
    </div>
  </div>

  <div class="conteudo">
    <iframe id="frame" src="pages/dashboard.html"></iframe>
  </div>
</div>

<script>
  function abrirPagina(pagina, btn) {
    document.getElementById('frame').src = pagina
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'))
    if (btn) btn.classList.add('active')
    atualizarBadges()
  }
  function atualizarBadges() {
    try {
      const fs   = require('fs')
      const path = require('path')
      const arg  = process.argv.find(a => a.startsWith('--data-dir='))
      const dir  = arg ? arg.replace('--data-dir=','') : path.join(__dirname,'data')
      const arq  = path.join(dir, 'clientes.json')
      const lista = fs.existsSync(arq) ? JSON.parse(fs.readFileSync(arq,'utf8')||'[]') : []
      const badge = document.getElementById('badgeClientes')
      if (badge) { badge.textContent = lista.length||''; badge.style.display = lista.length ? 'flex':'none' }
    } catch(e) {}
  }
  atualizarBadges()
  setInterval(atualizarBadges, 3000)
</script>
</body>
</html>
