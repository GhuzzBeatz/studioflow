<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GHZ Plugin — Gerador StudioFlow</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0d0d;color:#F2F2F2;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:16px}
  .wrap{max-width:560px;margin:0 auto}
  .header{display:flex;align-items:center;gap:12px;padding:20px 0 16px}
  .logo{width:44px;height:44px;background:#0f2460;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(15,36,96,.5);flex-shrink:0}
  .brand{font-size:20px;font-weight:800;color:#F2F2F2}
  .brand span{color:#4a90d9}
  .sub{font-size:12px;color:#555;margin-top:2px}
  .tabs{display:flex;gap:6px;margin-bottom:20px;background:#1A1A1A;padding:6px;border-radius:12px;border:1px solid #2A2A2A}
  .tab{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s;background:transparent;color:#666}
  .tab.active{background:#1282C9;color:#fff;box-shadow:0 2px 8px rgba(18,130,201,.3)}
  .page{display:none}
  .page.active{display:block}
  .card{background:#1A1A1A;border:1px solid #2A2A2A;border-radius:14px;padding:20px;margin-bottom:14px}
  label{font-size:10px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:7px}
  input{width:100%;background:#111;border:1px solid #333;border-radius:10px;padding:13px 16px;color:#F2F2F2;font-size:15px;outline:none;transition:border-color .2s}
  input:focus{border-color:#1282C9}
  .btn-main{width:100%;padding:14px;background:#1282C9;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;transition:background .2s;margin-top:12px;letter-spacing:.02em}
  .btn-main:hover{background:#0f6ea8}
  .key-card{background:#111;border:1.5px solid #1282C9;border-radius:12px;padding:20px;text-align:center;margin-top:14px;display:none}
  .key-label{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
  .key-value{font-family:monospace;font-size:22px;font-weight:800;color:#4a90d9;letter-spacing:.15em;word-break:break-all}
  .key-name{font-size:12px;color:#666;margin-top:8px}
  .btn-copy{background:#1282C9;border:none;border-radius:8px;color:#fff;padding:11px 24px;cursor:pointer;font-size:13px;font-weight:700;margin-top:14px;transition:background .2s;width:100%}
  .btn-copy:hover{background:#0f6ea8}
  .search-input{margin-bottom:14px}
  .list-empty{color:#555;font-size:13px;padding:24px;text-align:center;background:#1A1A1A;border-radius:10px;border:1px solid #2A2A2A}
  .list-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;background:#1A1A1A;border:1px solid #2A2A2A;border-radius:10px;margin-bottom:8px;transition:border-color .2s}
  .list-item:hover{border-color:#383838}
  .item-key{font-family:monospace;color:#4a90d9;font-weight:700;font-size:13px;letter-spacing:.08em;white-space:nowrap}
  .item-info{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden}
  .item-name{color:#A1A1A1;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item-date{color:#555;font-size:11px}
  .btn-del{background:none;border:none;color:#444;cursor:pointer;font-size:14px;padding:6px 8px;border-radius:6px;flex-shrink:0;transition:all .2s}
  .btn-del:hover{color:#E0142D;background:rgba(224,20,45,.1)}
  .btn-copiar-chave{background:none;border:1px solid #2A2A2A;border-radius:6px;color:#4a90d9;cursor:pointer;font-size:11px;font-weight:700;padding:4px 10px;white-space:nowrap;transition:all .2s}
  .btn-copiar-chave:hover{border-color:#1282C9;background:#1282C920}
  .badge{display:inline-flex;align-items:center;justify-content:center;background:#1282C9;color:#fff;border-radius:99px;font-size:10px;font-weight:800;padding:2px 7px;margin-left:6px}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .stat{background:#1A1A1A;border:1px solid #2A2A2A;border-radius:10px;padding:14px;text-align:center}
  .stat-val{font-size:24px;font-weight:800;color:#4a90d9}
  .stat-lbl{font-size:11px;color:#555;margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
  .footer{text-align:center;font-size:11px;color:#333;padding:20px 0 8px}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo">✂️</div>
    <div>
      <div class="brand">Studio<span>Flow</span></div>
      <div class="sub">Gerador de Licenças — GHZ Plugin</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="trocarAba('gerar')">⚡ Gerar Chave</button>
    <button class="tab" onclick="trocarAba('lista')" id="tabLista">📋 Chaves Geradas</button>
  </div>

  <!-- ABA 1: GERAR -->
  <div id="page-gerar" class="page active">
    <div class="card">
      <label>Nome do Cliente</label>
      <input id="nomeCliente" placeholder="Ex: João Silva" onkeydown="if(event.key==='Enter')gerar()"/>
      <button class="btn-main" onclick="gerar()">⚡ Gerar Nova Chave</button>
    </div>
    <div class="key-card" id="resultado">
      <div class="key-label">Chave de Licença Gerada</div>
      <div class="key-value" id="chaveGerada"></div>
      <div class="key-name" id="nomeExibido"></div>
      <button class="btn-copy" onclick="copiarMensagem()">📋 Copiar Mensagem para WhatsApp</button>
    </div>
  </div>

  <!-- ABA 2: LISTA -->
  <div id="page-lista" class="page">
    <div class="stats">
      <div class="stat"><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">Licenças Geradas</div></div>
      <div class="stat"><div class="stat-val" id="statMes">0</div><div class="stat-lbl">Este Mês</div></div>
    </div>
    <div class="card" style="padding:14px">
      <input class="search-input" id="buscaChave" placeholder="🔍 Buscar por nome ou chave..." oninput="renderLista()" style="margin:0"/>
    </div>
    <div id="listaChaves"></div>
  </div>

  <div class="footer">GHZ Plugin © 2026 — Use apenas para clientes que adquiriram o StudioFlow</div>
</div>

<script>
const SALT   = 'GHZ2026STFLOW'
const PREFIX = 'STFLOW'
const LS_KEY = 'ghz_studioflow_licencas'

// Mesmo algoritmo do app — deve ser idêntico ao js/licenca.js
function gerarChave(n) {
  const p1 = String(n).padStart(4, '0')
  const p2 = btoa(n + SALT).replace(/[^A-Z0-9]/gi, '').slice(0, 4).toUpperCase()
  const p3 = String((n * 13) % 9999).padStart(4, '0')
  return `${PREFIX}-${p1}-${p2}-${p3}`
}

function trocarAba(aba) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  const idx = aba === 'gerar' ? 0 : 1
  document.querySelectorAll('.tab')[idx].classList.add('active')
  document.getElementById('page-' + aba).classList.add('active')
  if (aba === 'lista') renderLista()
}

function gerar() {
  const nome = document.getElementById('nomeCliente').value.trim() || 'Cliente'
  const n    = Math.floor(1000 + Math.random() * 8999)
  const chave = gerarChave(n)

  document.getElementById('chaveGerada').textContent = chave
  document.getElementById('nomeExibido').textContent = 'Cliente: ' + nome
  document.getElementById('resultado').style.display = 'block'

  const lista = JSON.parse(localStorage.getItem(LS_KEY) || '[]')
  lista.unshift({ chave, nome, data: new Date().toLocaleDateString('pt-BR'), ts: Date.now() })
  localStorage.setItem(LS_KEY, JSON.stringify(lista))
  atualizarBadge()
}

function copiarMensagem() {
  const chave = document.getElementById('chaveGerada').textContent
  const nome  = document.getElementById('nomeCliente').value.trim() || 'cliente'
  const msg =
`Olá, ${nome}! 👋

Obrigado por adquirir o *StudioFlow*! ✂️💈

Segue abaixo a chave da sua licença:

🔑 *${chave}*

📥 *Link para download do app:*
[COLE AQUI O LINK DO DRIVE DO STUDIOFLOW]

*Como ativar:*
1. Baixe e instale o StudioFlow pelo link acima
2. Abra o app
3. Digite a chave acima e clique em "Ativar Licença"
4. Pronto! ✅

Qualquer dúvida, estou à disposição.
*GHZ Plugin* — (11) 94898-1459`

  navigator.clipboard.writeText(msg).then(() => {
    const btn = document.querySelector('.btn-copy')
    const orig = btn.textContent
    btn.textContent = '✓ Copiado! Cole no WhatsApp'
    btn.style.background = '#00A87A'
    setTimeout(() => { btn.textContent = orig; btn.style.background = '' }, 3000)
  })
}

function copiarSoChave(chave) {
  navigator.clipboard.writeText(chave).then(() => {
    document.querySelectorAll('.btn-copiar-chave').forEach(el => {
      if (el.getAttribute('data-chave') === chave) {
        el.textContent = '✓'
        setTimeout(() => el.textContent = 'Copiar', 1500)
      }
    })
  })
}

function deletar(chave) {
  if (!confirm('Remover esta chave do histórico?')) return
  let lista = JSON.parse(localStorage.getItem(LS_KEY) || '[]')
  lista = lista.filter(x => x.chave !== chave)
  localStorage.setItem(LS_KEY, JSON.stringify(lista))
  renderLista()
  atualizarBadge()
}

function atualizarBadge() {
  const lista  = JSON.parse(localStorage.getItem(LS_KEY) || '[]')
  const tabEl  = document.getElementById('tabLista')
  tabEl.innerHTML = `📋 Chaves Geradas${lista.length > 0 ? `<span class="badge">${lista.length}</span>` : ''}`
}

function renderLista() {
  const busca = (document.getElementById('buscaChave')?.value || '').toLowerCase().trim()
  let lista   = JSON.parse(localStorage.getItem(LS_KEY) || '[]')
  const total = lista.length
  const hoje  = new Date()
  const mes   = lista.filter(x => {
    const p = x.data.split('/')
    return parseInt(p[1]) === hoje.getMonth()+1 && parseInt(p[2]) === hoje.getFullYear()
  }).length
  document.getElementById('statTotal').textContent = total
  document.getElementById('statMes').textContent   = mes
  if (busca) lista = lista.filter(x =>
    x.nome.toLowerCase().includes(busca) || x.chave.toLowerCase().includes(busca)
  )
  const el = document.getElementById('listaChaves')
  if (!lista.length) {
    el.innerHTML = `<div class="list-empty">${total === 0 ? 'Nenhuma chave gerada ainda.' : 'Nenhum resultado para "'+busca+'"'}</div>`
    return
  }
  el.innerHTML = lista.map(item => `
    <div class="list-item">
      <div class="item-info">
        <span class="item-key">${item.chave}</span>
        <span class="item-name">${item.nome}</span>
        <span class="item-date">📅 ${item.data}</span>
      </div>
      <button class="btn-copiar-chave" data-chave="${item.chave}" onclick="copiarSoChave('${item.chave}')">Copiar</button>
      <button class="btn-del" onclick="deletar('${item.chave}')" title="Remover">✕</button>
    </div>
  `).join('')
}

atualizarBadge()
renderLista()
</script>
</body>
</html>
