<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="page-wrap">

  <div class="page-title">Agenda de Atendimentos</div>
  <div class="page-sub">Cadastre e gerencie os atendimentos</div>

  <!-- FORMULÁRIO NOVO ATENDIMENTO -->
  <div class="form-card">
    <h3>Novo Atendimento</h3>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Data</label>
        <input type="date" id="data" style="width:150px">
      </div>
      <div class="form-group">
        <label class="form-label">Horário</label>
        <input type="time" id="hora" style="width:120px">
      </div>

      <!-- BUSCA DE CLIENTE COM AUTOCOMPLETE -->
      <div class="form-group flex2">
        <label class="form-label">Cliente (busque por nome ou celular)</label>
        <div class="autocomplete-wrap" id="acWrap">
          <input type="text" id="clienteBusca" placeholder="Digite nome ou celular..."
            oninput="filtrarClientes()" onkeydown="navAutoComplete(event)" autocomplete="off">
          <div class="autocomplete-list" id="acList"></div>
          <input type="hidden" id="clienteSelecionado">
        </div>
      </div>

      <div class="form-group flex2">
        <label class="form-label">Serviço</label>
        <select id="servicoSelect">
          <option value="">Selecione o serviço...</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">&nbsp;</label>
        <button class="btn btn-primary" onclick="salvarAtendimento()">+ Registrar</button>
      </div>
    </div>
    <div class="aviso aviso-erro" id="avisoErro"></div>
    <div class="aviso aviso-ok"  id="avisoOk"></div>
  </div>

  <!-- FILTROS -->
  <div style="display:flex;gap:12px;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap">
    <div class="form-group">
      <label class="form-label">Filtrar por data</label>
      <input type="date" id="filtroData" oninput="renderAgenda()" style="width:160px">
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select id="filtroStatus" onchange="renderAgenda()" style="width:160px">
        <option value="">Todos</option>
        <option value="pendente">Pendentes</option>
        <option value="atendido">Atendidos</option>
      </select>
    </div>
    <button class="btn btn-success" onclick="limparFiltro()" style="margin-bottom:2px">Ver Todos</button>
    <span style="margin-left:auto;font-size:12px;color:#555;align-self:flex-end" id="countAgenda"></span>
  </div>

  <!-- TABELA -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Horário</th>
          <th>Cliente</th>
          <th>Serviço</th>
          <th>Status</th>
          <th style="text-align:right">Valor</th>
          <th style="text-align:center">Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaAgenda">
        <tr><td colspan="7" class="empty">Nenhum atendimento registrado.</td></tr>
      </tbody>
    </table>
  </div>

  <!-- MODAL EDIÇÃO -->
  <div class="modal-overlay" id="modalEdit" style="display:none" onclick="fecharModal(event)">
    <div class="modal-box">
      <div class="modal-title">✏️ Editar Agendamento</div>
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nova Data</label>
          <input type="date" id="editData">
        </div>
        <div class="form-group">
          <label class="form-label">Novo Horário</label>
          <input type="time" id="editHora">
        </div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <div class="form-group flex2">
          <label class="form-label">Serviço</label>
          <select id="editServico"></select>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" style="background:#2a2a2a;color:#888;border:1px solid #333" onclick="document.getElementById('modalEdit').style.display='none'">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarEdicao()">Salvar Alteração</button>
      </div>
    </div>
  </div>

</div>
<script src="../js/agenda.js"></script>
</body>
</html>
