<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="page-wrap">

  <div class="page-title">Financeiro</div>
  <div class="page-sub">Acompanhe o faturamento dos atendimentos</div>

  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px">
    <div class="dash-card">
      <div>
        <div class="dash-card-label">Total Faturado</div>
        <div class="dash-card-val" id="totalGeral" style="color:#00c878">R$ 0,00</div>
        <div class="dash-card-sub" id="labelTotalGeral">todos os períodos</div>
      </div>
      <div class="dash-card-icon icon-green">💰</div>
    </div>
    <div class="dash-card">
      <div>
        <div class="dash-card-label">Faturamento do Mês</div>
        <div class="dash-card-val" id="totalMes">R$ 0,00</div>
        <div class="dash-card-sub" id="nomeMes">mês atual</div>
      </div>
      <div class="dash-card-icon icon-blue">📅</div>
    </div>
    <div class="dash-card">
      <div>
        <div class="dash-card-label">Ticket Médio</div>
        <div class="dash-card-val" id="ticketMedio">R$ 0,00</div>
        <div class="dash-card-sub">por atendimento</div>
      </div>
      <div class="dash-card-icon icon-orange">🎯</div>
    </div>
  </div>

  <div style="display:flex;gap:12px;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap">
    <div class="form-group">
      <label class="form-label">Filtrar por mês</label>
      <input type="month" id="filtroMes" oninput="renderFinanceiro()" style="width:170px">
    </div>
    <button class="btn btn-success" onclick="limparFiltro()">Ver Todos</button>
    <span style="margin-left:auto;font-size:12px;color:#555;align-self:flex-end" id="countFin"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Horário</th>
          <th>Cliente</th>
          <th>Serviço</th>
          <th style="text-align:right">Valor</th>
        </tr>
      </thead>
      <tbody id="tabelaFinanceiro">
        <tr><td colspan="5" class="empty">Nenhum registro financeiro.</td></tr>
      </tbody>
    </table>
  </div>

</div>
<script src="../js/financeiro.js"></script>
</body>
</html>
